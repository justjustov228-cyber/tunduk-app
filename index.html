<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tunduk</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="status" class="offline">не подключено</div>

  <!-- AUTH SCREEN -->
  <div id="auth">
    <div id="logoWrap">
      <svg width="100" height="100" viewBox="0 0 120 120">
        <circle cx="60" cy="60" r="56" fill="#1e2128" stroke="#33363f" stroke-width="2"/>
        <g stroke="#5b6470" stroke-width="3" stroke-linecap="round">
          <line x1="60" y1="14" x2="60" y2="106"/>
          <line x1="14" y1="60" x2="106" y2="60"/>
          <line x1="27" y1="27" x2="93" y2="93"/>
          <line x1="93" y1="27" x2="27" y2="93"/>
        </g>
        <circle cx="60" cy="60" r="44" fill="none" stroke="#5b6470" stroke-width="2.5"/>
        <circle class="glow-ring-outer" cx="60" cy="60" r="14" fill="#e8a23d" opacity="0.25"/>
        <circle class="glow-ring" cx="60" cy="60" r="14" fill="#e8a23d" opacity="0.45"/>
        <circle cx="60" cy="60" r="14" fill="#e8a23d"/>
      </svg>
    </div>
    <div class="wordmark">tun<span class="light">duk</span></div>
    <p class="subtitle">тундук — окно к миру</p>

    <div id="authForm">
      <input id="username" type="text" placeholder="Имя пользователя" autocomplete="off">
      <input id="password" type="password" placeholder="Пароль" autocomplete="off">
      <div id="authError"></div>
      <button id="loginBtn">Войти</button>
      <button id="registerBtn" class="secondary">Зарегистрироваться</button>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app">
    <div id="topbar">
      <div class="meBlock" id="meBlock">
        <div class="avatar small" id="myAvatarSmall"></div>
        <span class="me" id="meLabel"></span>
      </div>
      <div class="topbarActions">
        <button id="settingsBtn"></button>
        <button id="logoutBtn"></button>
      </div>
    </div>
    <div id="body">

      <!-- Users list -->
      <div id="usersPanel">
        <button id="refreshUsers"></button>
        <div id="usersList"></div>
      </div>

      <!-- Chat -->
      <div id="chatPanel">
        <div id="chatHeader">
          <button id="backBtn"></button>
          <div class="avatar small" id="chatAvatarSmall"></div>
          <strong id="chatWithLabel"></strong>
        </div>
        <div id="messages"></div>
        <div id="inputBar">
          <input id="msgInput" type="text" placeholder="Сообщение...">
          <button id="sendBtn"></button>
        </div>
      </div>

      <!-- Profile -->
      <div id="profileScreen">
        <div class="screenHeader">
          <button id="profileBackBtn"></button>
          <strong>Профиль</strong>
        </div>
        <div id="profileBody">
          <div class="avatarWrap">
            <div class="avatar" id="profileAvatarBig"></div>
            <div class="avatarEditBtn" id="avatarEditBtn"></div>
            <input type="file" id="avatarFileInput" accept="image/*" style="display:none;">
          </div>

          <label>Имя пользователя</label>
          <input id="profileUsernameInput" type="text" maxlength="32">

          <label>О себе</label>
          <textarea id="profileBioInput" maxlength="200" placeholder="Расскажи немного о себе..."></textarea>

          <button id="saveProfileBtn">Сохранить</button>
          <div id="profileMsg"></div>
        </div>
      </div>

      <!-- Settings -->
      <div id="settingsScreen">
        <div class="screenHeader">
          <button id="settingsBackBtn"></button>
          <strong>Настройки</strong>
        </div>
        <div id="settingsBody">

          <div class="settingsGroup">
            <div class="settingsGroupLabel">Уведомления</div>
            <div class="settingsRow" id="soundToggleRow">
              <div class="settingsRowLeft">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                <span class="settingsRowLabel">Звук сообщений</span>
              </div>
              <div class="toggle on" id="soundToggle"></div>
            </div>
          </div>

          <div class="settingsGroup">
            <div class="settingsGroupLabel">Оформление чата</div>
            <div class="wallpaperGrid" id="wallpaperGrid"></div>
          </div>

        </div>
      </div>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
