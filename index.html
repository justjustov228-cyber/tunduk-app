<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tunduk</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="status" class="offline">не подключено</div>

  <!-- AUTH SCREEN -->
  <div id="auth">
    <h1>Tunduk</h1>
    <p class="subtitle">тундук — окно к миру</p>
    <input id="username" type="text" placeholder="Имя пользователя" autocomplete="off">
    <input id="password" type="password" placeholder="Пароль" autocomplete="off">
    <div id="authError"></div>
    <button id="loginBtn">Войти</button>
    <button id="registerBtn" class="secondary">Зарегистрироваться</button>
  </div>

  <!-- MAIN APP -->
  <div id="app">
    <div id="topbar">
      <span class="me" id="meLabel"></span>
      <button id="logoutBtn"></button>
    </div>
    <div id="body">
      <div id="usersPanel">
        <button id="refreshUsers"></button>
        <div id="usersList"></div>
      </div>
      <div id="chatPanel">
        <div id="chatHeader">
          <button id="backBtn"></button>
          <strong id="chatWithLabel"></strong>
        </div>
        <div id="messages"></div>
        <div id="inputBar">
          <input id="msgInput" type="text" placeholder="Сообщение...">
          <button id="sendBtn"></button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
