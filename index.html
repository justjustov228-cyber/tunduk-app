<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tunduk</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, Roboto, Arial, sans-serif;
    background: #111;
    color: #eee;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  #status {
    padding: 6px 10px;
    font-size: 12px;
    text-align: center;
    background: #222;
    color: #999;
  }
  #status.online { color: #4caf50; }
  #status.offline { color: #f44336; }

  /* --- Auth screen --- */
  #auth {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
    gap: 10px;
  }
  #auth input {
    width: 100%;
    max-width: 300px;
    padding: 12px;
    margin: 4px 0;
    border-radius: 8px;
    border: 1px solid #444;
    background: #1c1c1c;
    color: #eee;
    font-size: 16px;
  }
  #auth button {
    width: 100%;
    max-width: 300px;
    padding: 12px;
    margin-top: 8px;
    border-radius: 8px;
    border: none;
    background: #2196f3;
    color: white;
    font-size: 16px;
    cursor: pointer;
  }
  #auth button.secondary {
    background: #333;
  }
  #authError {
    color: #f44336;
    font-size: 13px;
    min-height: 18px;
  }
  h1 { font-size: 22px; margin-bottom: 0; }
  .subtitle { color: #888; font-size: 13px; margin-top: 0; margin-bottom: 16px; }

  /* --- Main app --- */
  #app {
    display: none;
    flex: 1;
    flex-direction: column;
    overflow: hidden;
  }
  #topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    background: #1c1c1c;
    border-bottom: 1px solid #333;
  }
  #topbar .me { font-weight: bold; }
  #topbar button {
    background: none;
    border: none;
    color: #f44336;
    font-size: 14px;
  }

  #body {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* Users list */
  #usersPanel {
    width: 100%;
    overflow-y: auto;
    background: #161616;
  }
  #usersPanel.hidden { display: none; }
  .userItem {
    padding: 14px;
    border-bottom: 1px solid #262626;
    cursor: pointer;
  }
  .userItem:active { background: #222; }
  #refreshUsers {
    width: 100%;
    padding: 10px;
    background: #1c1c1c;
    color: #2196f3;
    border: none;
    border-bottom: 1px solid #333;
  }

  /* Chat panel */
  #chatPanel {
    width: 100%;
    display: none;
    flex-direction: column;
  }
  #chatPanel.active { display: flex; }
  #chatHeader {
    padding: 10px 14px;
    background: #1c1c1c;
    border-bottom: 1px solid #333;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #chatHeader button {
    background: none;
    border: none;
    color: #2196f3;
    font-size: 20px;
  }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .msg {
    max-width: 75%;
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 15px;
    word-wrap: break-word;
  }
  .msg.mine {
    align-self: flex-end;
    background: #2196f3;
    color: white;
  }
  .msg.theirs {
    align-self: flex-start;
    background: #2a2a2a;
  }
  .msg .meta {
    font-size: 10px;
    opacity: 0.6;
    margin-top: 3px;
  }
  #inputBar {
    display: flex;
    padding: 8px;
    background: #1c1c1c;
    border-top: 1px solid #333;
    gap: 8px;
  }
  #inputBar input {
    flex: 1;
    padding: 10px;
    border-radius: 20px;
    border: 1px solid #444;
    background: #222;
    color: #eee;
    font-size: 15px;
  }
  #inputBar button {
    padding: 10px 16px;
    border-radius: 20px;
    border: none;
    background: #2196f3;
    color: white;
  }
</style>
</head>
<body>

  <div id="status" class="offline">не подключено</div>

  <!-- AUTH SCREEN -->
  <div id="auth">
    <h1>Tunduk</h1>
    <p class="subtitle">тундук — окно к миру</p>
    <input id="username" type="text" placeholder="Имя пользователя" autocomplete="off">
    <input id="password" type="password" placeholder="Пароль" autocomplete="off">
    <div id="authError"></div>
    <button id="loginBtn">Войти</button>
    <button id="registerBtn" class="secondary">Зарегистрироваться</button>
  </div>

  <!-- MAIN APP -->
  <div id="app">
    <div id="topbar">
      <span class="me" id="meLabel"></span>
      <button id="logoutBtn">Выйти</button>
    </div>
    <div id="body">
      <div id="usersPanel">
        <button id="refreshUsers">⟳ Обновить список</button>
        <div id="usersList"></div>
      </div>
      <div id="chatPanel">
        <div id="chatHeader">
          <button id="backBtn">←</button>
          <strong id="chatWithLabel"></strong>
        </div>
        <div id="messages"></div>
        <div id="inputBar">
          <input id="msgInput" type="text" placeholder="Сообщение...">
          <button id="sendBtn">➤</button>
        </div>
      </div>
    </div>
  </div>

<script>
// ======= НАСТРОЙКИ =======
const API_BASE = "https://tunduk-messenger.onrender.com";
const WS_BASE = "wss://tunduk-messenger.onrender.com";
// ==========================

let token = localStorage.getItem("tunduk_token") || null;
let myUsername = localStorage.getItem("tunduk_username") || null;
let ws = null;
let currentChatWith = null;
let allUsers = [];
// Кэш сообщений по собеседнику: { "alice": [ {sender, receiver, content, timestamp}, ... ] }
let messageCache = {};

const $ = (id) => document.getElementById(id);

function setStatus(text, online) {
  const el = $("status");
  el.textContent = text;
  el.className = online ? "online" : "offline";
}

function showAuth() {
  $("auth").style.display = "flex";
  $("app").style.display = "none";
}

function showApp() {
  $("auth").style.display = "none";
  $("app").style.display = "flex";
  $("meLabel").textContent = myUsername;
  loadUsers();
  connectWebSocket();
}

// ---------- AUTH ----------

async function register() {
  const username = $("username").value.trim();
  const password = $("password").value;
  $("authError").textContent = "";
  if (!username || !password) {
    $("authError").textContent = "Заполни имя и пароль";
    return;
  }
  try {
    const res = await fetch(`${API_BASE}/register`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok) {
      $("authError").textContent = data.detail || "Ошибка регистрации";
      return;
    }
    // После успешной регистрации сразу логинимся
    await login();
  } catch (e) {
    $("authError").textContent = "Сервер не отвечает: " + e.message;
  }
}

async function login() {
  const username = $("username").value.trim();
  const password = $("password").value;
  $("authError").textContent = "";
  if (!username || !password) {
    $("authError").textContent = "Заполни имя и пароль";
    return;
  }
  try {
    const body = new URLSearchParams();
    body.append("username", username);
    body.append("password", password);
    body.append("grant_type", "password");

    const res = await fetch(`${API_BASE}/login`, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: body.toString()
    });
    const data = await res.json();
    if (!res.ok) {
      $("authError").textContent = data.detail || "Ошибка входа";
      return;
    }
    token = data.access_token;
    myUsername = username;
    localStorage.setItem("tunduk_token", token);
    localStorage.setItem("tunduk_username", myUsername);
    showApp();
  } catch (e) {
    $("authError").textContent = "Сервер не отвечает: " + e.message;
  }
}

function logout() {
  if (ws) { ws.close(); ws = null; }
  token = null;
  myUsername = null;
  localStorage.removeItem("tunduk_token");
  localStorage.removeItem("tunduk_username");
  messageCache = {};
  $("username").value = "";
  $("password").value = "";
  setStatus("не подключено", false);
  showAuth();
}

// ---------- USERS ----------

async function loadUsers() {
  try {
    const res = await fetch(`${API_BASE}/users`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    if (res.status === 401) { logout(); return; }
    allUsers = await res.json();
    renderUsers();
  } catch (e) {
    console.error("Не удалось загрузить пользователей", e);
  }
}

function renderUsers() {
  const list = $("usersList");
  list.innerHTML = "";
  if (allUsers.length === 0) {
    list.innerHTML = `<div style="padding:14px;color:#888;">Пока нет других пользователей</div>`;
    return;
  }
  allUsers.forEach(u => {
    const div = document.createElement("div");
    div.className = "userItem";
    div.textContent = u.username;
    div.onclick = () => openChat(u.username);
    list.appendChild(div);
  });
}

// ---------- CHAT NAVIGATION ----------

async function openChat(username) {
  currentChatWith = username;
  $("chatWithLabel").textContent = username;
  $("chatPanel").classList.add("active");
  $("usersPanel").classList.add("hidden");
  await loadHistory(username);
}

function closeChat() {
  currentChatWith = null;
  $("chatPanel").classList.remove("active");
  $("usersPanel").classList.remove("hidden");
}

async function loadHistory(username) {
  $("messages").innerHTML = `<div style="text-align:center;color:#666;font-size:13px;">Загрузка...</div>`;
  try {
    const res = await fetch(`${API_BASE}/messages/${encodeURIComponent(username)}`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    if (res.status === 401) { logout(); return; }
    const history = await res.json();
    messageCache[username] = history.map(m => ({
      sender: m.sender_id === undefined ? null : null, // заполним ниже через id->username нельзя, используем поля напрямую
      content: m.content,
      timestamp: m.timestamp,
      // backend отдаёт sender_id/receiver_id, а не имена — определим "моё" сообщение или нет иначе
      raw: m
    }));
    renderMessages(username);
  } catch (e) {
    $("messages").innerHTML = `<div style="text-align:center;color:#f44336;">Не удалось загрузить историю</div>`;
  }
}

function renderMessages(username) {
  const container = $("messages");
  container.innerHTML = "";
  const msgs = messageCache[username] || [];
  msgs.forEach(m => addMessageBubble(m.content, m.mine, m.timestamp));
  container.scrollTop = container.scrollHeight;
}

function addMessageBubble(content, mine, timestamp) {
  const container = $("messages");
  const div = document.createElement("div");
  div.className = "msg " + (mine ? "mine" : "theirs");
  const time = timestamp ? new Date(timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "";
  div.innerHTML = `${escapeHtml(content)}<div class="meta">${time}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function escapeHtml(str) {
  const d = document.createElement("div");
  d.textContent = str;
  return d.innerHTML;
}

// ---------- WEBSOCKET ----------

function connectWebSocket() {
  if (ws) ws.close();
  ws = new WebSocket(`${WS_BASE}/ws?token=${encodeURIComponent(token)}`);

  ws.onopen = () => setStatus("онлайн", true);

  ws.onclose = () => {
    setStatus("отключено, переподключение...", false);
    // Простая переподготовка соединения через 3 секунды, если мы ещё залогинены
    if (token) setTimeout(connectWebSocket, 3000);
  };

  ws.onerror = () => setStatus("ошибка соединения", false);

  ws.onmessage = (event) => {
    let data;
    try { data = JSON.parse(event.data); } catch { return; }

    if (data.type === "error") {
      alert("Ошибка: " + data.detail);
      return;
    }

    if (data.type === "message") {
      // Входящее сообщение от другого пользователя
      const other = data.sender;
      if (!messageCache[other]) messageCache[other] = [];
      messageCache[other].push({ content: data.content, mine: false, timestamp: data.timestamp });
      if (currentChatWith === other) {
        addMessageBubble(data.content, false, data.timestamp);
      }
      // Обновим список пользователей на случай нового собеседника
      if (!allUsers.find(u => u.username === other)) {
        loadUsers();
      }
    }

    if (data.type === "ack") {
      // Подтверждение, что моё сообщение дошло до сервера (и доставлено получателю, если онлайн)
      const other = data.receiver;
      if (!messageCache[other]) messageCache[other] = [];
      messageCache[other].push({ content: data.content, mine: true, timestamp: data.timestamp });
      if (currentChatWith === other) {
        addMessageBubble(data.content, true, data.timestamp);
      }
    }
  };
}

function sendMessage() {
  const input = $("msgInput");
  const content = input.value.trim();
  if (!content || !currentChatWith) return;
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    alert("Нет соединения с сервером, подожди переподключения");
    return;
  }
  ws.send(JSON.stringify({ receiver: currentChatWith, content }));
  input.value = "";
}

// ---------- EVENTS ----------

$("loginBtn").onclick = login;
$("registerBtn").onclick = register;
$("logoutBtn").onclick = logout;
$("refreshUsers").onclick = loadUsers;
$("backBtn").onclick = closeChat;
$("sendBtn").onclick = sendMessage;
$("msgInput").addEventListener("keypress", (e) => {
  if (e.key === "Enter") sendMessage();
});

// ---------- INIT ----------

if (token && myUsername) {
  showApp();
} else {
  showAuth();
}
</script>
</body>
</html>
